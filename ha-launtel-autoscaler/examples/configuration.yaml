# ── 2. AUTOMATIONS ──────────────────────────────────────────────────

automation:

  # ── Notify on speed tier change ─────────────────────────────────
  - id: launtel_speed_change_notification
    alias: "Launtel: Notify on Speed Change"
    trigger:
      - platform: event
        event_type: launtel_autoscaler_speed_changed
    action:
      - service: notify.mobile_app_your_phone  # Change to your device
        data:
          title: "Launtel Speed Changed"
          message: >
            {{ trigger.event.data.direction | title }}: 
            {{ trigger.event.data.from_tier }} → {{ trigger.event.data.to_tier }}
            ({{ trigger.event.data.reason }})
          data:
            tag: launtel_speed_change
            group: launtel

  # ── Boost speed for gaming hours ────────────────────────────────
  - id: launtel_gaming_boost
    alias: "Launtel: Gaming Hours Boost"
    trigger:
      - platform: time
        at: "19:00:00"
    condition:
      - condition: time
        weekday:
          - fri
          - sat
          - sun
    action:
      - service: launtel_autoscaler.change_speed
        data:
          tier_id: "1000_50"
      - service: notify.mobile_app_your_phone
        data:
          message: "Launtel boosted to 1000/50 for gaming night!"

  # ── Drop back after gaming hours ────────────────────────────────
  - id: launtel_gaming_drop
    alias: "Launtel: Post-Gaming Drop"
    trigger:
      - platform: time
        at: "23:30:00"
    condition:
      - condition: time
        weekday:
          - fri
          - sat
          - sun
    action:
      - service: launtel_autoscaler.change_speed
        data:
          tier_id: "100_20"

  # ── Disable autoscaler when nobody's home ───────────────────────
  - id: launtel_away_mode
    alias: "Launtel: Away Mode"
    trigger:
      - platform: state
        entity_id: group.family
        to: "not_home"
        for:
          minutes: 30
    action:
      - service: switch.turn_off
        target:
          entity_id: switch.launtel_autoscaler
      - service: launtel_autoscaler.change_speed
        data:
          tier_id: "25_5"
      - service: notify.mobile_app_your_phone
        data:
          message: "Everyone's out — Launtel dropped to 25/5 to save money."

  # ── Re-enable when someone arrives home ─────────────────────────
  - id: launtel_home_mode
    alias: "Launtel: Home Mode"
    trigger:
      - platform: state
        entity_id: group.family
        to: "home"
    action:
      - service: launtel_autoscaler.change_speed
        data:
          tier_id: "100_20"
      - service: switch.turn_on
        target:
          entity_id: switch.launtel_autoscaler

  # ── Work-from-home schedule: higher upload tier on weekdays ─────
  - id: launtel_wfh_start
    alias: "Launtel: WFH Morning Boost"
    trigger:
      - platform: time
        at: "08:00:00"
    condition:
      - condition: time
        weekday:
          - mon
          - tue
          - wed
          - thu
          - fri
      - condition: state
        entity_id: person.you  # Change to your person entity
        state: "home"
    action:
      - service: launtel_autoscaler.change_speed
        data:
          tier_id: "100_40"  # Higher upload for video calls

  # ── Budget guard: alert if daily cost is high ───────────────────
  - id: launtel_budget_alert
    alias: "Launtel: Budget Alert"
    trigger:
      - platform: numeric_state
        entity_id: sensor.launtel_daily_cost
        above: 5.00
        for:
          hours: 2
    action:
      - service: notify.mobile_app_your_phone
        data:
          title: "Launtel Cost Alert"
          message: >
            Your Launtel daily rate has been above $5/day for 2 hours.
            Current: ${{ states('sensor.launtel_daily_cost') }}/day
            (~${{ (states('sensor.launtel_daily_cost') | float * 30.44) | round(2) }}/month)


