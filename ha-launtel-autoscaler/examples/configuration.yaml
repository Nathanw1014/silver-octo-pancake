# ═══════════════════════════════════════════════════════════════════════
#  LAUNTEL AUTOSCALER — HOME ASSISTANT CONFIGURATION EXAMPLES
# ═══════════════════════════════════════════════════════════════════════
#
#  These go in your configuration.yaml (or split files).
#  They create the WAN utilisation sensor from your UniFi gateway
#  and set up useful automations around the autoscaler.
#
# ═══════════════════════════════════════════════════════════════════════


# ── 1. WAN UTILISATION SENSOR ───────────────────────────────────────
#
#  The autoscaler needs a sensor that reports WAN utilisation as a
#  percentage (0–100). There are several ways to get this from UniFi:
#
#  OPTION A: Use the UniFi Network integration's built-in sensors.
#            The HA UniFi integration exposes uplink sensors for the
#            gateway. Look for entities like:
#              sensor.udm_wan_download_speed
#              sensor.udm_wan_upload_speed
#            Then use a template sensor to calculate utilisation %.
#
#  OPTION B: Use SNMP to poll the gateway directly.
#
#  OPTION C: Use the UniFi controller API via a REST sensor.
#
#  Below is OPTION A (most common) and OPTION C (most flexible).


# ── OPTION A: Template sensor from UniFi integration ────────────────

template:
  - sensor:
      # Calculates WAN utilisation as a percentage of your current
      # Launtel tier's download speed.
      - name: "WAN Utilisation Percent"
        unique_id: wan_utilisation_percent
        unit_of_measurement: "%"
        state_class: measurement
        icon: mdi:chart-line
        state: >
          {% set wan_down_mbps = states('sensor.udm_wan_download') | float(0) %}
          {% set tier_down_mbps = states('sensor.launtel_download_speed') | float(100) %}
          {% if tier_down_mbps > 0 %}
            {{ ((wan_down_mbps / tier_down_mbps) * 100) | round(1) }}
          {% else %}
            0
          {% endif %}
        availability: >
          {{ states('sensor.udm_wan_download') not in ['unknown', 'unavailable'] }}
        attributes:
          wan_download_mbps: "{{ states('sensor.udm_wan_download') }}"
          tier_download_mbps: "{{ states('sensor.launtel_download_speed') }}"

      # Smoothed version (5-minute rolling average) — less noisy
      - name: "WAN Utilisation Smoothed"
        unique_id: wan_utilisation_smoothed
        unit_of_measurement: "%"
        state_class: measurement
        icon: mdi:chart-bell-curve
        state: >
          {{ state_attr('sensor.wan_utilisation_percent', 'wan_download_mbps')
             | float(0) | round(1) }}


