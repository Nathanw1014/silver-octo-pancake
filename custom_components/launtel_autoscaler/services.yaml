change_speed:
  name: Change Speed Tier
  description: Manually change the Launtel NBN speed tier.
  fields:
    tier_id:
      name: Tier ID
      description: >
        The tier identifier (e.g. "100_20", "250_25", "1000_50").
        Use this OR psid, not both.
      example: "250_25"
      selector:
        select:
          options:
            - standby
            - 25_5
            - 50_20
            - 100_20
            - 100_40
            - 250_25
            - 250_100
            - 400_50
            - 500_200
            - 1000_50
            - 1000_400
    psid:
      name: Plan Speed ID
      description: >
        The numeric plan speed ID from Launtel's system.
        Use this for precise control if you know the PSID.
      example: 2669
      selector:
        number:
          min: 1
          max: 99999
          mode: box

set_autoscale:
  name: Configure Autoscaler
  description: Update autoscaler settings at runtime without restarting.
  fields:
    enabled:
      name: Enabled
      description: Turn autoscaling on or off.
      selector:
        boolean:
    wan_sensor:
      name: WAN Sensor Entity
      description: Entity ID of the WAN utilisation percentage sensor.
      example: "sensor.unifi_wan_utilisation"
      selector:
        entity:
          domain: sensor
    upgrade_threshold:
      name: Upgrade Threshold (%)
      description: Sustained utilisation above this triggers a scale-up.
      selector:
        number:
          min: 50
          max: 99
          unit_of_measurement: "%"
    downgrade_threshold:
      name: Downgrade Threshold (%)
      description: Sustained utilisation below this triggers a scale-down.
      selector:
        number:
          min: 5
          max: 70
          unit_of_measurement: "%"
    min_tier:
      name: Minimum Tier
      description: The autoscaler will never go below this tier.
      selector:
        select:
          options:
            - standby
            - 25_5
            - 50_20
            - 100_20
            - 100_40
            - 250_25
    max_tier:
      name: Maximum Tier
      description: The autoscaler will never go above this tier.
      selector:
        select:
          options:
            - 250_25
            - 250_100
            - 400_50
            - 500_200
            - 1000_50
            - 1000_400
    cooldown_mins:
      name: Cooldown (minutes)
      description: Minimum time between speed changes.
      selector:
        number:
          min: 5
          max: 120
          unit_of_measurement: min
