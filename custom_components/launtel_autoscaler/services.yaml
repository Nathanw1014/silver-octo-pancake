change_speed:
  name: Change Speed Tier
  description: Manually change the Launtel NBN speed tier using the plan speed ID (psid). You can find available psids in the Launtel tier select dropdown or by checking your Launtel portal.
  fields:
    psid:
      name: Plan Speed ID
      description: The numeric plan speed ID from Launtel's system. Run the launtsched script in interactive mode or check the select entity attributes to find available PSIDs.
      required: true
      example: 2669
      selector:
        number:
          min: 1
          max: 99999
          mode: box
    entry_id:
      name: Config Entry ID
      description: Optional. Only needed if you have multiple Launtel services configured.
      selector:
        text:

set_autoscale:
  name: Configure Autoscaler
  description: Update autoscaler settings at runtime without restarting.
  fields:
    enabled:
      name: Enabled
      description: Turn autoscaling on or off.
      selector:
        boolean:
    wan_sensor:
      name: WAN Sensor Entity
      description: Entity ID of the WAN utilisation percentage sensor.
      example: "sensor.wan_utilisation_percent"
      selector:
        entity:
          domain: sensor
    upgrade_threshold:
      name: Upgrade Threshold
      description: Sustained utilisation above this percentage triggers a scale-up.
      selector:
        number:
          min: 50
          max: 99
          unit_of_measurement: "%"
    downgrade_threshold:
      name: Downgrade Threshold
      description: Sustained utilisation below this percentage triggers a scale-down.
      selector:
        number:
          min: 5
          max: 70
          unit_of_measurement: "%"
    upgrade_sustained_mins:
      name: Upgrade Sustained Minutes
      description: How many minutes utilisation must stay above threshold before scaling up.
      selector:
        number:
          min: 1
          max: 60
          unit_of_measurement: min
    downgrade_sustained_mins:
      name: Downgrade Sustained Minutes
      description: How many minutes utilisation must stay below threshold before scaling down.
      selector:
        number:
          min: 5
          max: 120
          unit_of_measurement: min
    cooldown_mins:
      name: Cooldown
      description: Minimum time between speed changes.
      selector:
        number:
          min: 5
          max: 120
          unit_of_measurement: min
